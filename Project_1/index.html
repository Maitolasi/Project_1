<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood and Activity Tracker</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    


    <div class="container">
        <h1>Mood and Activity Tracker</h1>

        <div class="moods">
            <button data-mood="happy">😊</button>
            <button data-mood="sad">😢</button>
            <button data-mood="neutral">😐</button>
        </div>


        <form id="entryForm">
            <input type="text" id="activity" placeholder="What did you do today?">
            <button type="submit">add</button>
       </form>

       <div class="filters">
        <select id="filterMood">
                <option value="all">all</option>
                <option value="happy">happy</option>
                <option value="sad">sad</option>
                <option value="neutral">neutral</option>
        </select>

        <input type="text" id="search" placeholder="search">
       </div>


       <div id="stats"></div>


       <ul id="entries"></ul>

    </div>

    
    <script src="app.js"></script>
</body>
</html>
